name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Create files
        shell: powershell
        run: |
          $pkg = '{"name":"npm-start-service","version":"1.0.0","description":"IMS Launcher","author":"alihepi","main":"main.js","scripts":{"dist":"electron-builder --win --x64"},"build":{"appId":"com.alihepi.imsserver","win":{"target":"portable"},"portable":{"requestExecutionLevel":"user"}},"devDependencies":{"electron":"^28.0.0","electron-builder":"^24.0.0"}}'
          [System.IO.File]::WriteAllText("package.json", $pkg, [System.Text.UTF8Encoding]::new($false))

      - name: Create icon
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(256, 256)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.FillRectangle([System.Drawing.Brushes]::Blue, 0, 0, 256, 256)
          $g.FillRectangle([System.Drawing.Brushes]::White, 96, 32, 64, 192)
          $bmp.Save("icon.png", [System.Drawing.Imaging.ImageFormat]::Png)

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npm run dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-start-service
          path: dist\*.exe