name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pystray pillow pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name "npm-start-service" npm_start_service.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-start-service
          path: dist\npm-start-service.exe
